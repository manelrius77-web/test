<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Formulario de Huchas €</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f4f8;
      color: #1f2937;
      margin: 0;
      padding: 24px;
    }
    .panel {
      max-width: 860px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #d1d8e5;
      border-radius: 12px;
      padding: 18px;
    }
    h1 { margin-top: 0; }
    fieldset {
      border: 1px solid #c8d2e3;
      border-radius: 10px;
      margin-bottom: 16px;
      padding: 14px;
    }
    legend { font-weight: 700; padding: 0 6px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }
    label {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 0.95rem;
    }
    input, select, button {
      font: inherit;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #b8c5dd;
    }
    button {
      cursor: pointer;
      background: #1565d8;
      color: #fff;
      border-color: #1565d8;
    }
    button.danger {
      background: #fff;
      color: #b42318;
      border-color: #e3a7a3;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      border-bottom: 1px solid #e2e8f0;
      text-align: left;
      padding: 8px;
      vertical-align: middle;
    }
    .icono {
      font-size: 1.3rem;
      margin-right: 6px;
    }
    .total {
      font-weight: 700;
      color: #0a7a35;
    }
    .muted { color: #667085; }
    ul { margin: 8px 0 0 18px; }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Formulario de huchas en euros</h1>

    <form id="formCrear" autocomplete="off">
      <fieldset>
        <legend>1) Crear hucha</legend>
        <div class="grid">
          <label>
            Nombre de la hucha
            <input id="nombreHucha" name="nombreHucha" type="text" required placeholder="Ejemplo: Vacaciones" />
          </label>
          <label>
            Icono identificativo
            <select id="iconoHucha" name="iconoHucha" required>
              <option value="🐷">🐷 Cerdito</option>
              <option value="🏖️">🏖️ Playa</option>
              <option value="🚗">🚗 Coche</option>
              <option value="🎁">🎁 Regalo</option>
              <option value="🏠">🏠 Casa</option>
              <option value="🎓">🎓 Estudios</option>
            </select>
          </label>
        </div>
        <button type="submit">Guardar hucha</button>
      </fieldset>
    </form>

    <form id="formIngreso" autocomplete="off">
      <fieldset>
        <legend>2) Ingresar monedas o billetes</legend>
        <div class="grid">
          <label>
            Hucha
            <select id="huchaSelect" name="huchaSelect" required></select>
          </label>
          <label>
            Denominación (€)
            <select id="denominacionSelect" name="denominacionSelect" required></select>
          </label>
          <label>
            Cantidad de piezas
            <input id="cantidadInput" name="cantidadInput" type="number" min="1" step="1" value="1" required />
          </label>
        </div>
        <button type="submit">Añadir ingreso</button>
      </fieldset>
    </form>

    <section>
      <h2>Resumen de huchas</h2>
      <p class="muted">Aquí verás cada hucha con su icono, desglose y total acumulado.</p>
      <div id="resumen"></div>
    </section>
  </main>

  <script>
    const denominaciones = [0.01, 0.02, 0.05, 0.10, 0.20, 0.50, 1, 2, 5, 10, 20, 50, 100, 200, 500];
    const huchas = [];

    const formCrear = document.getElementById('formCrear');
    const formIngreso = document.getElementById('formIngreso');
    const huchaSelect = document.getElementById('huchaSelect');
    const denominacionSelect = document.getElementById('denominacionSelect');
    const resumen = document.getElementById('resumen');

    const formatEuro = (n) => n.toLocaleString('es-ES', { style: 'currency', currency: 'EUR' });

    function llenarDenominaciones() {
      denominacionSelect.innerHTML = '';
      denominaciones.forEach((d) => {
        const opt = document.createElement('option');
        opt.value = d;
        opt.textContent = formatEuro(d);
        denominacionSelect.appendChild(opt);
      });
    }

    function totalHucha(hucha) {
      return denominaciones.reduce((acc, d) => acc + (hucha.contenido[d] * d), 0);
    }

    function refrescarSelectHuchas() {
      huchaSelect.innerHTML = '';

      if (!huchas.length) {
        const opt = document.createElement('option');
        opt.value = '';
        opt.textContent = 'Primero crea una hucha';
        huchaSelect.appendChild(opt);
        return;
      }

      huchas.forEach((h) => {
        const opt = document.createElement('option');
        opt.value = h.id;
        opt.textContent = `${h.icono} ${h.nombre}`;
        huchaSelect.appendChild(opt);
      });
    }

    function renderResumen() {
      resumen.innerHTML = '';

      if (!huchas.length) {
        resumen.innerHTML = '<p class="muted">No hay huchas creadas todavía.</p>';
        return;
      }

      const table = document.createElement('table');
      table.innerHTML = '<thead><tr><th>Hucha</th><th>Desglose</th><th>Total</th><th>Acciones</th></tr></thead>';
      const tbody = document.createElement('tbody');

      huchas.forEach((h) => {
        const tr = document.createElement('tr');

        const tdNombre = document.createElement('td');
        tdNombre.innerHTML = `<span class="icono">${h.icono}</span>${h.nombre}`;

        const tdDesglose = document.createElement('td');
        const ul = document.createElement('ul');
        let tieneMovimientos = false;

        denominaciones.forEach((d) => {
          const cantidad = h.contenido[d];
          if (cantidad > 0) {
            tieneMovimientos = true;
            const li = document.createElement('li');
            li.textContent = `${cantidad} × ${formatEuro(d)} = ${formatEuro(cantidad * d)}`;
            ul.appendChild(li);
          }
        });

        if (tieneMovimientos) {
          tdDesglose.appendChild(ul);
        } else {
          tdDesglose.textContent = 'Sin ingresos';
          tdDesglose.className = 'muted';
        }

        const tdTotal = document.createElement('td');
        tdTotal.className = 'total';
        tdTotal.textContent = formatEuro(totalHucha(h));

        const tdAcciones = document.createElement('td');
        const eliminarBtn = document.createElement('button');
        eliminarBtn.type = 'button';
        eliminarBtn.className = 'danger';
        eliminarBtn.textContent = 'Eliminar';
        eliminarBtn.addEventListener('click', () => {
          const i = huchas.findIndex((item) => item.id === h.id);
          if (i >= 0) {
            huchas.splice(i, 1);
            refrescarSelectHuchas();
            renderResumen();
          }
        });
        tdAcciones.appendChild(eliminarBtn);

        tr.append(tdNombre, tdDesglose, tdTotal, tdAcciones);
        tbody.appendChild(tr);
      });

      table.appendChild(tbody);
      resumen.appendChild(table);
    }

    formCrear.addEventListener('submit', (event) => {
      event.preventDefault();
      const nombre = document.getElementById('nombreHucha').value.trim();
      const icono = document.getElementById('iconoHucha').value;

      if (!nombre) return;

      const contenido = Object.fromEntries(denominaciones.map((d) => [d, 0]));
      huchas.push({ id: crypto.randomUUID(), nombre, icono, contenido });

      formCrear.reset();
      refrescarSelectHuchas();
      renderResumen();
    });

    formIngreso.addEventListener('submit', (event) => {
      event.preventDefault();

      if (!huchas.length) return;

      const idHucha = huchaSelect.value;
      const denominacion = Number(denominacionSelect.value);
      const cantidad = Number(document.getElementById('cantidadInput').value);

      if (!idHucha || cantidad < 1) return;

      const hucha = huchas.find((h) => h.id === idHucha);
      if (!hucha) return;

      hucha.contenido[denominacion] += cantidad;
      formIngreso.reset();
      document.getElementById('cantidadInput').value = 1;
      renderResumen();
    });

    llenarDenominaciones();
    refrescarSelectHuchas();
    renderResumen();
  </script>
</body>
</html>
