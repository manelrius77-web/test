<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calculadora de Números Grandes</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(160deg, #eef2ff, #f8fafc);
      color: #0f172a;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .app {
      width: min(860px, 100%);
      background: #ffffff;
      border: 1px solid #dbe3f7;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(37, 57, 108, 0.12);
    }
    h1 { margin: 0 0 6px; font-size: 1.5rem; }
    .muted { margin: 0 0 16px; color: #475569; font-size: .95rem; }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    input, button {
      font: inherit;
      border-radius: 10px;
      border: 1px solid #bfcaea;
      padding: 12px 14px;
    }

    input {
      width: 100%;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 1rem;
    }

    .ops {
      display: grid;
      grid-template-columns: repeat(7, minmax(60px, 1fr));
      gap: 8px;
    }

    button {
      cursor: pointer;
      background: #1d4ed8;
      color: #fff;
      border-color: #1d4ed8;
      font-weight: 700;
    }

    button.secondary {
      background: #fff;
      color: #1d4ed8;
      border-color: #aab9e4;
      font-weight: 600;
    }

    .result {
      background: #f8fbff;
      border: 1px solid #d6e1ff;
      border-radius: 10px;
      padding: 12px;
      min-height: 96px;
    }

    .result code {
      display: block;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      word-break: break-all;
      white-space: pre-wrap;
      color: #0b1324;
      margin-top: 6px;
    }

    .error { color: #b91c1c; }

    @media (max-width: 700px) {
      .ops { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Calculadora de números grandes</h1>
    <p class="muted">Opera enteros gigantes sin perder precisión usando <strong>BigInt</strong>.</p>

    <section class="grid" aria-label="calculadora">
      <label for="a">Número A</label>
      <input id="a" type="text" inputmode="numeric" placeholder="Ej: 999999999999999999999999" />

      <label for="b">Número B</label>
      <input id="b" type="text" inputmode="numeric" placeholder="Ej: 123456789012345678901234" />

      <div class="ops">
        <button data-op="+">A + B</button>
        <button data-op="-">A - B</button>
        <button data-op="*">A × B</button>
        <button data-op="/">A ÷ B</button>
        <button data-op="%">A % B</button>
        <button data-op="**">A ^ B</button>
        <button id="swap" class="secondary" type="button">Intercambiar</button>
      </div>

      <div class="ops">
        <button id="clear" class="secondary" type="button">Limpiar</button>
        <button id="fill" class="secondary" type="button">Ejemplo grande</button>
      </div>

      <div class="result" aria-live="polite">
        <strong>Resultado</strong>
        <code id="out">Introduce dos números enteros y elige una operación.</code>
      </div>
    </section>
  </main>

  <script>
    const inputA = document.getElementById('a');
    const inputB = document.getElementById('b');
    const out = document.getElementById('out');

    function cleanInt(value) {
      const normalized = value.trim();
      if (!/^[-+]?\d+$/.test(normalized)) {
        throw new Error('Solo se permiten enteros (sin comas ni decimales).');
      }
      return BigInt(normalized);
    }

    function setResult(text, isError = false) {
      out.textContent = text;
      out.className = isError ? 'error' : '';
    }

    function calculate(op) {
      try {
        const a = cleanInt(inputA.value);
        const b = cleanInt(inputB.value);
        let result;

        switch (op) {
          case '+': result = a + b; break;
          case '-': result = a - b; break;
          case '*': result = a * b; break;
          case '/':
            if (b === 0n) throw new Error('No se puede dividir entre cero.');
            result = a / b;
            break;
          case '%':
            if (b === 0n) throw new Error('No se puede usar módulo con cero.');
            result = a % b;
            break;
          case '**':
            if (b < 0n) throw new Error('El exponente debe ser positivo o cero.');
            if (b > 10000n) throw new Error('Exponente demasiado grande (máximo recomendado: 10000).');
            result = a ** b;
            break;
          default:
            throw new Error('Operación no soportada.');
        }

        setResult(String(result));
      } catch (err) {
        setResult(err.message, true);
      }
    }

    document.querySelectorAll('[data-op]').forEach((btn) => {
      btn.addEventListener('click', () => calculate(btn.dataset.op));
    });

    document.getElementById('swap').addEventListener('click', () => {
      const tmp = inputA.value;
      inputA.value = inputB.value;
      inputB.value = tmp;
      setResult('Valores intercambiados.');
    });

    document.getElementById('clear').addEventListener('click', () => {
      inputA.value = '';
      inputB.value = '';
      setResult('Introduce dos números enteros y elige una operación.');
      inputA.focus();
    });

    document.getElementById('fill').addEventListener('click', () => {
      inputA.value = '9876543210987654321098765432109876543210';
      inputB.value = '1234567890123456789012345678901234567890';
      setResult('Ejemplo cargado. Elige una operación.');
    });
  </script>
</body>
</html>
