<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hucha de Euros</title>
  <style>
    :root { color-scheme: light; }
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f5f7fb;
      color: #1e2430;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
    }
    h1 { margin-top: 0; }
    .card {
      background: #fff;
      border: 1px solid #d9e1f2;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(31, 49, 95, 0.06);
    }
    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    input, select, button {
      font: inherit;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #bdc8e2;
    }
    button {
      cursor: pointer;
      background: #1f6feb;
      color: #fff;
      border-color: #1f6feb;
    }
    button.secondary {
      background: #fff;
      color: #1f6feb;
    }
    .denoms {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(88px, 1fr));
      gap: 8px;
      margin-top: 12px;
    }
    .hucha-item {
      border: 1px solid #d9e1f2;
      border-radius: 10px;
      padding: 12px;
      margin-top: 12px;
      background: #fbfcff;
    }
    .total {
      font-size: 1.25rem;
      font-weight: 700;
      margin-top: 10px;
      color: #0a7a35;
    }
    .small { color: #5d6a85; font-size: .95rem; }
    ul { margin: 8px 0 0 16px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Programa de huchas en euros</h1>

    <section class="card">
      <h2>Crear una nueva hucha</h2>
      <div class="row">
        <input id="nombreHucha" type="text" placeholder="Ejemplo: Viaje, Coche, Regalo..." />
        <button id="crearBtn">Crear hucha</button>
      </div>
      <p class="small">Puedes crear varias huchas y añadir monedas o billetes en euros a cada una.</p>
    </section>

    <section class="card">
      <h2>Mis huchas</h2>
      <div id="huchas"></div>
    </section>
  </div>

  <script>
    const denominaciones = [0.01, 0.02, 0.05, 0.10, 0.20, 0.50, 1, 2, 5, 10, 20, 50, 100, 200, 500];
    const huchas = [];

    const formatEuro = (value) => value.toLocaleString('es-ES', { style: 'currency', currency: 'EUR' });

    function crearHucha(nombre) {
      return {
        id: crypto.randomUUID(),
        nombre,
        contenido: Object.fromEntries(denominaciones.map(d => [d, 0]))
      };
    }

    function totalHucha(hucha) {
      return denominaciones.reduce((acc, d) => acc + d * hucha.contenido[d], 0);
    }

    function render() {
      const list = document.getElementById('huchas');
      list.innerHTML = '';

      if (huchas.length === 0) {
        list.innerHTML = '<p class="small">Aún no has creado ninguna hucha.</p>';
        return;
      }

      huchas.forEach((hucha) => {
        const wrapper = document.createElement('article');
        wrapper.className = 'hucha-item';

        const top = document.createElement('div');
        top.className = 'row';

        const title = document.createElement('h3');
        title.textContent = hucha.nombre;
        title.style.margin = '0';

        const removeBtn = document.createElement('button');
        removeBtn.textContent = 'Eliminar';
        removeBtn.className = 'secondary';
        removeBtn.addEventListener('click', () => {
          const idx = huchas.findIndex(h => h.id === hucha.id);
          if (idx >= 0) {
            huchas.splice(idx, 1);
            render();
          }
        });

        top.append(title, removeBtn);

        const buttons = document.createElement('div');
        buttons.className = 'denoms';

        denominaciones.forEach((d) => {
          const b = document.createElement('button');
          b.textContent = `+ ${formatEuro(d)}`;
          b.addEventListener('click', () => {
            hucha.contenido[d] += 1;
            render();
          });
          buttons.appendChild(b);
        });

        const resumen = document.createElement('ul');
        denominaciones.forEach((d) => {
          const cantidad = hucha.contenido[d];
          if (cantidad > 0) {
            const li = document.createElement('li');
            li.textContent = `${cantidad} x ${formatEuro(d)} = ${formatEuro(cantidad * d)}`;
            resumen.appendChild(li);
          }
        });

        if (!resumen.children.length) {
          const vacio = document.createElement('p');
          vacio.className = 'small';
          vacio.textContent = 'Esta hucha está vacía.';
          wrapper.append(top, buttons, vacio);
        } else {
          wrapper.append(top, buttons, resumen);
        }

        const total = document.createElement('p');
        total.className = 'total';
        total.textContent = `Total: ${formatEuro(totalHucha(hucha))}`;
        wrapper.appendChild(total);

        list.appendChild(wrapper);
      });
    }

    document.getElementById('crearBtn').addEventListener('click', () => {
      const input = document.getElementById('nombreHucha');
      const nombre = input.value.trim();
      if (!nombre) {
        input.focus();
        return;
      }
      huchas.push(crearHucha(nombre));
      input.value = '';
      render();
    });

    render();
  </script>
</body>
</html>
