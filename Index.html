<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mis Huchas</title>
  <style>
    :root {
      --bg: #f3f3f1;
      --card: #fcfcfc;
      --ink: #16171b;
      --mint: #a8ead2;
      --pink: #f2a1a8;
      --peach: #ffd2b2;
      --muted: #70737b;
      --shadow: #15161a;
      --radius: 22px;
      --border: 5px;
      --offset: 10px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Arial Black", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      padding-bottom: 30px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px 20px 22px;
      border-bottom: var(--border) solid var(--ink);
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .brand {
      font-size: 2.1rem;
      letter-spacing: 0.5px;
      margin: 0;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 16px;
    }

    .section-title {
      margin: 0;
      font-size: 2.2rem;
      letter-spacing: 0.5px;
    }

    .content {
      padding: 20px;
    }

    .btn,
    .pill {
      border: var(--border) solid var(--ink);
      border-radius: 20px;
      font-family: inherit;
      font-size: 1.1rem;
      letter-spacing: 1px;
      font-weight: 900;
      color: var(--ink);
      background: white;
      cursor: pointer;
      box-shadow: 8px 8px 0 0 var(--shadow);
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    .btn:active,
    .pill:active {
      transform: translate(2px, 2px);
      box-shadow: 5px 5px 0 0 var(--shadow);
    }

    .btn {
      padding: 14px 18px;
      min-width: 125px;
    }

    .btn.small {
      min-width: 88px;
      padding: 12px 16px;
      border-radius: 18px;
    }

    .btn.mint,
    .pill.mint {
      background: var(--mint);
    }

    .btn.pink,
    .pill.pink {
      background: var(--pink);
    }

    .btn.peach,
    .pill.peach {
      background: var(--peach);
    }

    .btn-ghost {
      width: 100%;
      text-align: center;
      padding: 18px;
      font-size: 1.9rem;
      line-height: 1;
    }

    .summary {
      margin: 6px 0 30px;
    }

    .label {
      font-size: 1rem;
      letter-spacing: 1.4px;
      margin: 0 0 8px;
    }

    .money {
      font-size: 3rem;
      margin: 0;
      line-height: 1;
    }

    .card {
      background: var(--card);
      border: var(--border) solid var(--ink);
      border-radius: var(--radius);
      box-shadow: 10px 10px 0 0 var(--shadow);
      padding: 18px;
      margin-bottom: 26px;
    }

    .pig {
      display: grid;
      grid-template-columns: 52px 1fr auto;
      column-gap: 12px;
      align-items: center;
    }

    .icon-box {
      width: 52px;
      height: 52px;
      border: var(--border) solid var(--ink);
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 1.45rem;
      background: var(--pink);
      box-shadow: 4px 4px 0 0 var(--shadow);
    }

    .pig h3 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: 0.3px;
    }

    .pig .emoji {
      font-size: 2.7rem;
    }

    .meta {
      margin-top: 16px;
      font-size: 0.95rem;
      letter-spacing: 1px;
    }

    .bar {
      height: 24px;
      border: var(--border) solid var(--ink);
      border-radius: 999px;
      overflow: hidden;
      margin: 8px 0;
      background: #fff;
    }

    .bar > span {
      height: 100%;
      display: block;
      background: var(--ink);
    }

    .subline {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .stats-grid {
      display: grid;
      gap: 18px;
      margin-top: 18px;
    }

    .stats-card h4 {
      margin: 0;
      font-size: 1.1rem;
      letter-spacing: 1px;
    }

    .stats-card p {
      margin: 12px 0 0;
      font-size: 3rem;
      line-height: 1;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(22, 23, 27, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 35;
      padding: 16px;
    }

    .overlay.show {
      display: flex;
    }

    .modal {
      width: min(430px, 100%);
      background: var(--card);
      border: var(--border) solid var(--ink);
      border-radius: var(--radius);
      box-shadow: 10px 10px 0 0 var(--shadow);
      padding: 18px;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: var(--border) solid var(--ink);
      border-radius: 14px;
      padding: 4px;
      margin-bottom: 16px;
      gap: 6px;
      background: #fff;
    }

    .tabs button {
      border: 0;
      background: transparent;
      padding: 12px 8px;
      font-family: inherit;
      font-weight: 900;
      font-size: 1.05rem;
      border-radius: 10px;
      cursor: pointer;
    }

    .tabs button.active {
      background: var(--mint);
      border: 3px solid var(--ink);
    }

    input,
    textarea {
      width: 100%;
      border: var(--border) solid var(--ink);
      border-radius: 14px;
      padding: 12px;
      font-size: 1.05rem;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .muted {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--muted);
      font-weight: 700;
      margin: 0;
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <h1 class="brand">🐷 MISHUCHAS</h1>
      <div>
        <button class="btn small mint" id="goStats">📊</button>
        <button class="btn small pink" title="salir">⇥</button>
      </div>
    </header>

    <section id="home" class="screen active content">
      <h2 class="section-title">HOLA, HIJO!</h2>

      <div class="summary">
        <p class="label">TOTAL AHORRADO</p>
        <p class="money" id="totalSaved">€358.88</p>
      </div>

      <div class="row">
        <h2 style="margin:0; font-size:2rem;">TUS HUCHAS (2)</h2>
        <button class="btn mint" id="newMovement">+ NUEVA</button>
      </div>

      <article class="card">
        <div class="pig">
          <div class="icon-box">🗑️</div>
          <div>
            <h3>VACACIONES</h3>
            <p class="money" style="font-size:2.6rem; margin-top:6px;">€235.33</p>
          </div>
          <div class="emoji">✈️</div>
        </div>
        <div class="meta">
          <p class="label" style="margin:0;">META <span style="float:right;">€1200.00</span></p>
          <div class="bar"><span style="width:20%;"></span></div>
          <p class="subline">20% completado</p>
        </div>
      </article>

      <article class="card">
        <div class="pig">
          <div class="icon-box">🗑️</div>
          <div>
            <h3>REGALO</h3>
            <p class="money" style="font-size:2.6rem; margin-top:6px;">€123.55</p>
          </div>
          <div class="emoji">♡</div>
        </div>
        <div class="meta">
          <p class="label" style="margin:0;">META <span style="float:right;">€500.00</span></p>
          <div class="bar"><span style="width:25%;"></span></div>
          <p class="subline">25% completado</p>
        </div>
      </article>
    </section>

    <section id="stats" class="screen content">
      <button class="btn mint" id="backHome">← VOLVER</button>
      <h2 class="section-title" style="margin-top:20px;">📊 ESTADÍSTICAS</h2>

      <div class="stats-grid">
        <article class="card stats-card">
          <h4>↗ TOTAL AHORRADO</h4>
          <p>€358.88</p>
        </article>

        <article class="card stats-card">
          <h4>🐷 HUCHAS ACTIVAS</h4>
          <p>2</p>
        </article>

        <article class="card stats-card">
          <h4>🕘 TRANSACCIONES</h4>
          <p>9</p>
        </article>
      </div>
    </section>
  </main>

  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="row" style="margin-bottom:10px;">
        <h3 style="margin:0; font-size:2rem;">AÑADIR DINERO</h3>
        <button id="closeModal" style="border:0;background:transparent;font-size:2.4rem;cursor:pointer;">×</button>
      </div>

      <div class="tabs">
        <button id="byTotal">CANTIDAD TOTAL</button>
        <button id="byTypes" class="active">MONEDAS/BILLETES</button>
      </div>

      <label class="label" for="amount">SELECCIONA TIPO</label>
      <input id="amount" type="number" step="0.01" placeholder="€0.00" />

      <button class="btn-ghost pill mint">AÑADIR MONEDAS &nbsp;&nbsp;&nbsp; 0 TIPOS</button>
      <button class="btn-ghost pill peach" style="margin-top:12px;">AÑADIR BILLETES &nbsp;&nbsp;&nbsp; 0 TIPOS</button>

      <label class="label" for="note" style="display:block; margin-top:16px;">DESCRIPCIÓN (OPCIONAL)</label>
      <textarea id="note" rows="2" placeholder="Ej: Ahorro mensual, Regalo..."></textarea>

      <div class="row" style="margin:0;">
        <button class="btn peach" id="cancelModal">CANCELAR</button>
        <button class="btn mint" id="confirmModal">CONFIRMAR</button>
      </div>
      <p class="muted" id="message" style="margin-top:12px;"></p>
    </div>
  </div>

  <script>
    const home = document.getElementById('home');
    const stats = document.getElementById('stats');
    const overlay = document.getElementById('overlay');
    const message = document.getElementById('message');
    const amount = document.getElementById('amount');
    const note = document.getElementById('note');

    function showScreen(screen) {
      home.classList.toggle('active', screen === 'home');
      stats.classList.toggle('active', screen === 'stats');
    }

    document.getElementById('goStats').addEventListener('click', () => showScreen('stats'));
    document.getElementById('backHome').addEventListener('click', () => showScreen('home'));

    document.getElementById('newMovement').addEventListener('click', () => {
      overlay.classList.add('show');
      message.textContent = '';
    });

    function closeModal() {
      overlay.classList.remove('show');
      amount.value = '';
      note.value = '';
      message.textContent = '';
    }

    document.getElementById('closeModal').addEventListener('click', closeModal);
    document.getElementById('cancelModal').addEventListener('click', closeModal);

    document.getElementById('confirmModal').addEventListener('click', () => {
      const value = Number(amount.value || 0);
      if (value <= 0) {
        message.textContent = 'Introduce una cantidad válida.';
        return;
      }
      message.textContent = 'Movimiento guardado en local (demo sin backend).';
      setTimeout(closeModal, 900);
    });

    const tabTotal = document.getElementById('byTotal');
    const tabTypes = document.getElementById('byTypes');

    function activateTab(which) {
      tabTotal.classList.toggle('active', which === 'total');
      tabTypes.classList.toggle('active', which === 'types');
    }

    tabTotal.addEventListener('click', () => activateTab('total'));
    tabTypes.addEventListener('click', () => activateTab('types'));
  </script>
</body>
</html>
