<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Control de Hucha</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(145deg, #eff6ff, #f8fafc);
      color: #0f172a;
      min-height: 100vh;
      padding: 24px;
      display: grid;
      place-items: center;
    }
    .app {
      width: min(820px, 100%);
      background: #fff;
      border: 1px solid #dbeafe;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 18px 40px rgba(30, 64, 175, .12);
      display: grid;
      gap: 18px;
    }
    h1 { margin: 0; }
    p { margin: 0; color: #334155; }
    .panel {
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 14px;
      background: #f8fafc;
    }
    .totales {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .kpi {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 10px;
    }
    .kpi span { display: block; color: #475569; font-size: .85rem; }
    .kpi strong { font-size: 1.3rem; }
    form {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(4, 1fr);
      align-items: end;
    }
    label { font-size: .9rem; display: grid; gap: 6px; }
    input, select, button {
      font: inherit;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
    }
    button {
      border-color: #1d4ed8;
      background: #1d4ed8;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    button.secundario {
      background: #fff;
      color: #1d4ed8;
    }
    .meta {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr auto;
      align-items: center;
    }
    progress {
      width: 100%;
      height: 14px;
      accent-color: #16a34a;
    }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; }
    th, td { padding: 10px; border-bottom: 1px solid #e2e8f0; text-align: left; }
    th { background: #f1f5f9; font-size: .9rem; }
    td.importe { font-weight: 700; }
    .entrada { color: #047857; }
    .salida { color: #b91c1c; }
    .acciones { display: flex; gap: 8px; }

    @media (max-width: 760px) {
      .totales, form { grid-template-columns: 1fr; }
      .acciones { flex-direction: column; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Control de Hucha</h1>
      <p>Apunta lo que metes o sacas de tu hucha y sigue tu progreso hacia una meta.</p>
    </header>

    <section class="panel totales" aria-label="resumen">
      <article class="kpi"><span>Saldo actual</span><strong id="saldo">0,00 €</strong></article>
      <article class="kpi"><span>Total ahorrado</span><strong id="ahorrado">0,00 €</strong></article>
      <article class="kpi"><span>Total retirado</span><strong id="retirado">0,00 €</strong></article>
    </section>

    <section class="panel" aria-label="movimientos">
      <form id="form-movimiento">
        <label>Tipo
          <select id="tipo">
            <option value="ingreso">Ingreso</option>
            <option value="retiro">Retiro</option>
          </select>
        </label>
        <label>Importe (€)
          <input id="importe" type="number" min="0.01" step="0.01" required>
        </label>
        <label>Concepto
          <input id="concepto" type="text" maxlength="45" placeholder="Ej: paga semanal" required>
        </label>
        <button type="submit">Guardar movimiento</button>
      </form>
    </section>

    <section class="panel" aria-label="meta">
      <div class="meta">
        <label>Meta de ahorro (€)
          <input id="meta" type="number" min="1" step="1" value="200">
        </label>
        <div class="acciones">
          <button id="guardar-meta" type="button" class="secundario">Guardar meta</button>
          <button id="vaciar" type="button" class="secundario">Vaciar historial</button>
        </div>
      </div>
      <p id="meta-texto">Llevas 0,00 € de 200,00 € (0%).</p>
      <progress id="barra-meta" value="0" max="100"></progress>
    </section>

    <section class="panel" aria-label="historial">
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Concepto</th>
            <th>Tipo</th>
            <th>Importe</th>
          </tr>
        </thead>
        <tbody id="historial"></tbody>
      </table>
    </section>
  </main>

  <script>
    const CLAVE_MOVIMIENTOS = 'hucha_movimientos';
    const CLAVE_META = 'hucha_meta';

    const saldoEl = document.getElementById('saldo');
    const ahorradoEl = document.getElementById('ahorrado');
    const retiradoEl = document.getElementById('retirado');
    const historialEl = document.getElementById('historial');
    const metaInput = document.getElementById('meta');
    const metaTexto = document.getElementById('meta-texto');
    const barraMeta = document.getElementById('barra-meta');

    const form = document.getElementById('form-movimiento');
    const tipoInput = document.getElementById('tipo');
    const importeInput = document.getElementById('importe');
    const conceptoInput = document.getElementById('concepto');

    const formatoMoneda = new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR' });

    const cargarMovimientos = () => JSON.parse(localStorage.getItem(CLAVE_MOVIMIENTOS) || '[]');
    const guardarMovimientos = (datos) => localStorage.setItem(CLAVE_MOVIMIENTOS, JSON.stringify(datos));
    const cargarMeta = () => Number(localStorage.getItem(CLAVE_META) || 200);

    function guardarMeta() {
      const valor = Number(metaInput.value);
      if (!Number.isFinite(valor) || valor <= 0) {
        alert('La meta debe ser un número mayor que 0.');
        return;
      }
      localStorage.setItem(CLAVE_META, String(valor));
      render();
    }

    function agregarMovimiento(event) {
      event.preventDefault();
      const importe = Number(importeInput.value);
      const concepto = conceptoInput.value.trim();
      const tipo = tipoInput.value;

      if (!Number.isFinite(importe) || importe <= 0) {
        alert('Introduce un importe válido.');
        return;
      }
      if (!concepto) {
        alert('Añade un concepto para el movimiento.');
        return;
      }

      const movimientos = cargarMovimientos();
      movimientos.unshift({
        id: crypto.randomUUID(),
        fecha: new Date().toISOString(),
        concepto,
        tipo,
        importe
      });

      guardarMovimientos(movimientos);
      form.reset();
      tipoInput.value = 'ingreso';
      render();
    }

    function vaciarHistorial() {
      if (!confirm('¿Seguro que quieres borrar todos los movimientos?')) return;
      localStorage.removeItem(CLAVE_MOVIMIENTOS);
      render();
    }

    function renderHistorial(movimientos) {
      historialEl.innerHTML = '';
      if (!movimientos.length) {
        historialEl.innerHTML = '<tr><td colspan="4">Sin movimientos todavía.</td></tr>';
        return;
      }

      for (const mov of movimientos) {
        const fila = document.createElement('tr');
        const importeClass = mov.tipo === 'ingreso' ? 'entrada' : 'salida';
        const signo = mov.tipo === 'ingreso' ? '+' : '-';
        fila.innerHTML = `
          <td>${new Date(mov.fecha).toLocaleDateString('es-ES')}</td>
          <td>${mov.concepto}</td>
          <td>${mov.tipo}</td>
          <td class="importe ${importeClass}">${signo}${formatoMoneda.format(mov.importe)}</td>
        `;
        historialEl.appendChild(fila);
      }
    }

    function render() {
      const movimientos = cargarMovimientos();
      const meta = cargarMeta();
      metaInput.value = meta;

      const totalIngreso = movimientos
        .filter((m) => m.tipo === 'ingreso')
        .reduce((acc, m) => acc + m.importe, 0);

      const totalRetiro = movimientos
        .filter((m) => m.tipo === 'retiro')
        .reduce((acc, m) => acc + m.importe, 0);

      const saldo = totalIngreso - totalRetiro;
      const progreso = Math.max(0, Math.min(100, (saldo / meta) * 100));

      saldoEl.textContent = formatoMoneda.format(saldo);
      ahorradoEl.textContent = formatoMoneda.format(totalIngreso);
      retiradoEl.textContent = formatoMoneda.format(totalRetiro);
      metaTexto.textContent = `Llevas ${formatoMoneda.format(saldo)} de ${formatoMoneda.format(meta)} (${progreso.toFixed(1)}%).`;
      barraMeta.value = progreso;

      renderHistorial(movimientos);
    }

    form.addEventListener('submit', agregarMovimiento);
    document.getElementById('guardar-meta').addEventListener('click', guardarMeta);
    document.getElementById('vaciar').addEventListener('click', vaciarHistorial);

    render();
  </script>
</body>
</html>
